version: "3.9"

services:

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Pipeline (scraper + gpt + bert + embed + newsletter) — cron 06:30
  pipeline:
    build:
      context: .
      dockerfile: docker/Dockerfile.pipeline
    env_file: .env
    restart: unless-stopped
    # docker exec pipeline python -m pipeline.run ile manuel tetiklenebilir
